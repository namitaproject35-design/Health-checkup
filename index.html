{% extends 'layout.html' %}
{% block content %}
    <section class="hero">
        <h2>Welcome to Health Checkup</h2>
        <p>Your personal health companion for disease prediction and advice.</p>
    </section>
    <section class="prediction-form">
        <h3>Symptom Checker</h3>
        <form action="/predict" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Name">
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required placeholder="Age">
            
            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
            
            <label for="symptoms">Describe Symptoms:</label>
            <textarea id="symptoms" name="symptoms" rows="4" required placeholder="bodypain, headache, fever"></textarea>

            <div class="checkbox-group">
                <h4>Common Symptoms (Check all that apply):</h4>
                <div class="checkbox-grid">
                    <div class="checkbox-item">
                        <input type="checkbox" id="fever" name="common_symptoms" value="fever">
                        <label for="fever">Fever</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="fatigue" name="common_symptoms" value="fatigue">
                        <label for="fatigue">Fatigue</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="nausea" name="common_symptoms" value="nausea">
                        <label for="nausea">Nausea</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="cough" name="common_symptoms" value="cough">
                        <label for="cough">Cough</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="headache" name="common_symptoms" value="headache">
                        <label for="headache">Headache</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="bodypain" name="common_symptoms" value="bodypain">
                        <label for="bodypain">Body Pain</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="runny_nose" name="common_symptoms" value="runny nose">
                        <label for="runny_nose">Runny Nose</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="sneezing" name="common_symptoms" value="sneezing">
                        <label for="sneezing">Sneezing</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="sore_throat" name="common_symptoms" value="sore throat">
                        <label for="sore_throat">Sore Throat</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="chills" name="common_symptoms" value="chills">
                        <label for="chills">Chills</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="dizziness" name="common_symptoms" value="dizziness">
                        <label for="dizziness">Dizziness</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="shortness_of_breath" name="common_symptoms" value="shortness of breath">
                        <label for="shortness_of_breath">Shortness of Breath</label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="predict-btn">Predict Possible Disease</button>
        </form>
    </section>
{% endblock %}
